    - http://az0-vpnip-public.oooninja.com/ip.txt
    - https://www.dan.me.uk/tornodes
    - https://raw.githubusercontent.com/avastel/proxy-bot-ips-lists/main/avastel-proxy-bot-ips-1day.txt
    - https://raw.githubusercontent.com/avastel/proxy-bot-ips-lists/main/avastel-proxy-bot-ips-blocklist-5days.txt
    - https://raw.githubusercontent.com/avastel/proxy-bot-ips-lists/main/avastel-proxy-bot-ips-blocklist-8days.txt
  lockdown:
    enabled: true
    log: true
    duration: 5000
    period: 5000
    period-limit: 4
  limbo:
    enabled: true
    log: true
    whitelist: true
    trigger:
      connections: 2
      period: 5
      seconds-active: 5
    dimension: 0
    captcha-count: 100
    timeout: 30
balancer:
  enabled: false
  on-join: true
  fallback: true
  lobby-command: true
  command-blacklist:
  - auth
  servers:
  - lobby
chained-proxy-support: false
chained-proxy:
  support-downstream: false
allow-invalid-names: false
large-payloads: false
maintenance:
  enabled: false
  protocol: '&c&lMaintenance'
  motd: |-
    &c&lMaintenance
    &cCome back later!
  sample:
  - '&c&lMaintenance'
  - '&cCome back later!'
  kick: |-
    &c&lMaintenance

    &cCome back later!
  whitelist:
  - ''
